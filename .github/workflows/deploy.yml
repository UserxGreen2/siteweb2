name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sanity check secrets
        run: |
          fail=0
          for v in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!v}" ]; then echo "::error::Secret $v is empty"; fail=1
            else echo "$v is set (length=${#}, prefix=$(echo "${!v}" | cut -c1-4))"; fi
          done
          [ "$fail" = "1" ] && exit 1 || true

      - name: Verify token via Vercel API
        run: |
          code=$(curl -sS -o /tmp/proj.json -w '%{http_code}' \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID")
          echo "HTTP $code"
          if [ "$code" != "200" ]; then
            echo "::error::Vercel API rejected the request. Body:"
            cat /tmp/proj.json
            exit 1
          fi
          name=$(jq -r '.name' /tmp/proj.json)
          account=$(jq -r '.accountId' /tmp/proj.json)
          fw=$(jq -r '.framework' /tmp/proj.json)
          echo "Project OK: name=$name accountId=$account framework=$fw"

      - name: Force framework=null (static site, no Next.js)
        run: |
          curl -sS -X PATCH \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"framework":null,"buildCommand":null,"outputDirectory":null,"installCommand":null,"devCommand":null}' \
            "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID?teamId=$VERCEL_ORG_ID" \
            -o /tmp/patched.json -w 'HTTP %{http_code}\n'
          jq '{name, framework, buildCommand, outputDirectory, installCommand}' /tmp/patched.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Deploy
        id: deploy
        run: |
          url=$(vercel deploy --prod --token=$VERCEL_TOKEN)
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"

      - name: Summary
        if: success()
        run: |
          echo "### Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
